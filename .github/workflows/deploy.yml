name: deploy

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: bun install

      # Build docs site (Astro) + console app (SolidStart)
      - run: bun turbo build --filter="./packages/console/app" --filter="./packages/web"

      # Copy docs into console Worker's public assets
      - run: cp -r packages/web/dist/docs packages/console/app/.output/public/docs

      # Deploy combined Worker to opensploit.ai
      # Remove conflicting wrangler configs generated by nitro build
      - run: |
          rm -rf packages/console/app/.wrangler
          rm -rf packages/console/app/.output/.wrangler
          cd packages/console/app/.output/server
          npx wrangler deploy \
            --name opensploit-console \
            --compatibility-date 2024-09-19
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
